services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: conductor_memory
      POSTGRES_USER: conductor
      POSTGRES_PASSWORD: conductor
    ports:
      - "54321:5432"
    volumes:
      - conductor_memory_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conductor -d conductor_memory"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  conductor_memory_pgdata:
